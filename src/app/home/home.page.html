<ion-header>
  <ion-toolbar>
    <ion-title>Calourex</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="home-content">

  <section class="hero">
    <div class="hero-text">
      <span class="badge">🎓 Guia do Calouro</span>

      <h1>Comece sua jornada universitária com confiança</h1>

      <p>
        Encontre setores, eventos, contatos e dicas importantes para os seus primeiros dias.
      </p>
    </div>

    <img
      class="hero-image"
      src="https://images.unsplash.com/photo-1523240795612-9a054b0db644"
      alt="Jovens universitários estudando juntos"
    />
  </section>

  <section class="quick-section">
    <h2>O que você precisa?</h2>

    <div class="quick-grid">

      <ion-card routerLink="/services" class="menu-card purple">
        <div class="icon-circle">
          <ion-icon name="school-outline"></ion-icon>
        </div>

        <h3>Setores</h3>

        <p>
          Secretaria, coordenação, biblioteca e suporte.
        </p>
      </ion-card>

      <ion-card routerLink="/events" class="menu-card blue">
        <div class="icon-circle">
          <ion-icon name="calendar-outline"></ion-icon>
        </div>

        <h3>Eventos</h3>

        <p>
          Integração, workshops e atividades para calouros.
        </p>
      </ion-card>

    </div>
  </section>

</ion-content>
